name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build recurl
        run: cargo build --release

      - name: Build recurld (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release --bin recurld --features daemon

      - name: Run unit tests
        run: cargo test --bin recurl --bin recurld

      - name: Run conformance tests (Unix)
        if: runner.os != 'Windows'
        run: cargo test --test conformance -- --test-threads=2
        env:
          RECURL_PATH: ./target/release/recurl

      - name: Run conformance tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --test conformance -- --test-threads=2
        env:
          RECURL_PATH: ./target/release/recurl.exe

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
