name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rcurl
        run: cargo build --release

      - name: Build rcurld (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release --bin rcurld --features daemon

      - name: Run unit tests
        run: cargo test

      - name: Run conformance tests (Unix)
        if: runner.os != 'Windows'
        run: cargo test --test conformance -- --test-threads=2
        env:
          RCURL_PATH: ./target/release/rcurl

      - name: Run conformance tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --test conformance -- --test-threads=2
        env:
          RCURL_PATH: ./target/release/rcurl.exe

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build-release:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, lint]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rcurl-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: rcurl-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rcurl-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rcurl-darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rcurl-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build rcurl (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build rcurl (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build rcurld (Unix native)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} --bin rcurld --features daemon

      - name: Build rcurld (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} --bin rcurld --features daemon

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/${{ matrix.artifact }}/bin
          cp target/${{ matrix.target }}/release/rcurl dist/${{ matrix.artifact }}/bin/
          cp target/${{ matrix.target }}/release/rcurld dist/${{ matrix.artifact }}/bin/ || true
          cp scripts/install.sh dist/${{ matrix.artifact }}/
          cp README.md dist/${{ matrix.artifact }}/
          cp LICENSE dist/${{ matrix.artifact }}/ || true
          chmod +x dist/${{ matrix.artifact }}/bin/*
          chmod +x dist/${{ matrix.artifact }}/install.sh
          tar -czvf ${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }}/bin
          Copy-Item target/${{ matrix.target }}/release/rcurl.exe dist/${{ matrix.artifact }}/bin/
          Copy-Item scripts/install.ps1 dist/${{ matrix.artifact }}/
          Copy-Item README.md dist/${{ matrix.artifact }}/
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/${{ matrix.artifact }}/ }
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip
          $hash = (Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ASCII ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
