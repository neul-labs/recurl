# Docker Compose configuration for recurl
# Usage:
#   docker-compose run --rm recurl https://example.com
#   docker-compose up -d recurld  # Start daemon in background

services:
  # recurl CLI - for one-off requests
  recurl:
    build: .
    image: recurl:latest
    volumes:
      - ./output:/output
    environment:
      - RECURL_DEBUG=${RECURL_DEBUG:-0}
    # Override entrypoint for custom commands
    # entrypoint: ["recurl"]

  # recurld daemon - for persistent browser pool
  recurld:
    build: .
    image: recurl:latest
    entrypoint: ["recurld", "start"]
    environment:
      - RECURL_DAEMON_IDLE_MS=300000  # 5 minutes
      - RECURL_POOL_MIN=1
      - RECURL_POOL_MAX=3
    # Chromium needs extra permissions
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    shm_size: 2gb
    volumes:
      - recurl-socket:/tmp
    restart: unless-stopped

volumes:
  recurl-socket:
